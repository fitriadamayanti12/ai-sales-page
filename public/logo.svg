<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#bg)"/>
  
  <!-- Sparkle icon -->
  <path d="M60 28L63 53L88 60L63 67L60 92L57 67L32 60L57 53L60 28Z" 
        fill="url(#sparkle)" 
        stroke="rgba(0,0,0,0.1)" 
        stroke-width="1.5"/>
  
  <!-- Small sparkles -->
  <circle cx="38" cy="38" r="3" fill="white" opacity="0.6"/>
  <circle cx="82" cy="38" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="38" cy="82" r="2" fill="white" opacity="0.4"/>
  <circle cx="82" cy="82" r="3.5" fill="white" opacity="0.5"/>
</svg>